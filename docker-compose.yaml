services:
 mongodb:
  build: ./mongodb # it moves to mongodb directory
  image: sivamedam/mongodb:1.0.0 # docker build -t joindevops/mongodb:1.0.0 .
  container_name: mongodb
 
 catalogue:
  build: ./catalogue
  image: sivamedam/catalogue:1.0.0
  container_name: catalogue
  depends_on:
   - mongodb

 redis:
  image: redis:7.0
  container_name: redis

 user:
  build: ./user
  image: sivamedam/user:1.0.0
  container_name: user
  depends_on:
   - redis
   - mongodb

 cart:
  build: ./cart
  image: sivamedam/cart:1.0.0
  container_name: cart
  depends_on:
   - redis 
   - catalogue

 frontend:
  build: ./frontend
  image: sivamedam/frontend:1.0.0
  container_name: frontend
  ports:
   - 8080:80
  depends_on:
   - catalogue
   - user
   - cart