services:
 mongodb:
  build: ./mongodb # it moves to mongodb directory
  image: sivamedam/mongodb:1.0.0 # docker build -t sivamedam/mongodb:1.0.0 .
  container_name: mongodb
 
 catalogue:
  build: ./catalogue
  image: sivamedam/catalogue:1.0.0
  container_name: catalogue
  depends_on:
   - mongodb

 redis:
  image: redis:7.0
  container_name: redis

 user:
  build: ./user
  image: sivamedam/user:1.0.0
  container_name: user
  depends_on:
   - redis
   - mongodb

 cart:
  build: ./cart
  image: sivamedam/cart:1.0.0
  container_name: cart
  depends_on:
   - redis 
   - catalogue

 mysql:
  build: ./mysql
  image: sivamedam/mysql:1.0.0
  container_name: mysql

 shipping:
  build: ./shipping
  image: sivamedam/shipping:1.0.0
  container_name: shipping
  depends_on:
   - cart
   - mysql

 rabbitmq:
  image: rabbitmq:3
  environment:
   RABBITMQ_DEFAULT_USER: roboshop
   RABBITMQ_DEFAULT_PASS: roboshop123
  container_name: rabbitmq

 payment:
  build: ./payment
  image: sivamedam/payment:1.0.0
  container_name: payment
  environment:
   CART_HOST: "cart"
   CART_PORT: "8080"
   USER_HOST: "user"
   USER_PORT: "8080"
   AMQP_HOST: "rabbitmq"
   AMQP_USER: "roboshop"
   AMQP_PASS: "roboshop123"
  depends_on:
   - cart
   - user
   - rabbitmq

 frontend:
  build: ./frontend
  image: sivamedam/frontend:1.0.0
  container_name: frontend
  ports:
   - 8080:80
  depends_on:
   - catalogue
   - user
   - cart
   - shipping
   - payment

networks:
 default:
  driver: bridge
  name: roboshop
  external: false # if true, you need to create network manually